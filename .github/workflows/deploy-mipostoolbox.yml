name: Deploy MIPOS ToolBox to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'mipostoolbox/**'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd mipostoolbox
          npm pkg set scripts.deploy="wrangler pages deploy . --project-name mipostoolbox" 2>/dev/null || true
          npx -y wrangler@latest pages deploy . --project-name mipostoolbox
