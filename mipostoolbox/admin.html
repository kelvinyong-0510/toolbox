<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Admin - MIPOS ToolBox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ── Brand Palette ── */
      --navy:          #1B2A4A;
      --navy-light:    #2a3f6e;
      --navy-dark:     #0f1a30;
      --orange:        #FF6600;
      --orange-hover:  #e55a00;
      --orange-glow:   rgba(255,102,0,0.20);
      --orange-light:  rgba(255,102,0,0.10);
      --orange-border: rgba(255,102,0,0.25);
      --peach:         #FFF5EB;
      --peach-deep:    #FFF0E0;

      /* ── Neutrals ── */
      --white:         #FFFFFF;
      --grey-bg:       #F9FAFB;
      --grey-border:   #E5E7EB;
      --grey:          #6B7280;
      --grey-light:    #9CA3AF;

      /* ── Status ── */
      --danger:      #DC2626;
      --danger-bg:   rgba(239,68,68,0.10);

      /* ── Typography ── */
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* ── Radii ── */
      --radius-sm: 8px;
      --radius:    12px;
      --radius-lg: 20px;
      --radius-xl: 24px;

      /* ── Shadows ── */
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow:    0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --shadow-xl: 0 16px 48px rgba(0,0,0,0.16);

      /* ── Transition ── */
      --trans: 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      margin: 0; padding: 0; font-family: var(--font);
      background: var(--grey-bg);
      color: var(--navy);
    }

    /* Hero header */
    .hero {
      background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, var(--navy-light) 100%);
      padding: 60px 20px 80px;
      position: relative;
      overflow: hidden;
      color: var(--white);
    }
    .hero::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,102,0,0.18) 0%, transparent 70%);
      top: -150px; right: -80px;
      pointer-events: none;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: -2px;
      margin: 0;
    }
    h1 span { color: var(--orange); }

    .nav-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 40px;
    }
    .back-link {
      color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 500; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .back-link:hover { color: var(--white); }
    
    /* Main Card */
    .main-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: var(--shadow-lg);
      margin-top: -40px;
      border: 1px solid var(--grey-border);
      position: relative;
      z-index: 10;
    }

    /* Toolbar inside card */
    .toolbar {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
    }

    .form-group { flex-shrink: 0; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    
    input, select, textarea {
      width: 100%;
      background: var(--grey-bg); border: 1.5px solid var(--grey-border);
      border-radius: var(--radius-sm); color: var(--navy);
      font-family: var(--font); font-size: 14px;
      padding: 11px 14px; outline: none;
      transition: border-color var(--trans), box-shadow var(--trans);
      box-sizing: border-box;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange-glow);
      background: var(--white);
    }
    textarea { min-height: 140px; font-family: monospace; font-size: 13px; }

    .select-wrapper { position: relative; width: 280px; }
    .select-wrapper::after {
      content: ''; position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      border-left: 4px solid transparent; border-right: 4px solid transparent;
      border-top: 5px solid var(--grey); pointer-events: none;
    }
    .select-wrapper select { padding-right: 36px; appearance: none; -webkit-appearance: none; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--orange); color: #fff;
      padding: 12px 24px; border-radius: var(--radius-xl);
      font-size: 14px; font-weight: 700; border: none; cursor: pointer;
      transition: var(--trans);
      box-shadow: 0 4px 16px var(--orange-glow);
    }
    .btn:hover { background: var(--orange-hover); transform: translateY(-2px); box-shadow: 0 8px 24px var(--orange-glow); }
    
    .btn-ghost {
      background: transparent; color: var(--navy);
      padding: 10px 20px; border-radius: var(--radius-xl);
      border: 1.5px solid var(--grey-border); font-size: 13px; font-weight: 600;
      box-shadow: none;
    }
    .btn-ghost:hover { border-color: var(--orange); color: var(--orange); box-shadow: none; transform: none; }

    .table-btn {
      background: var(--grey-bg); color: var(--navy); border: 1px solid var(--grey-border);
      padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: var(--trans); margin-right: 4px;
    }
    .table-btn:hover { border-color: var(--navy); }
    .btn-danger { color: var(--danger); }
    .btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

    /* Revert Button uses Orange */
    .revert-btn { background: var(--orange-light); border-color: var(--orange-border); color: var(--orange); padding: 4px 10px; font-size: 11px; font-weight: 700; }
    .revert-btn:hover { background: var(--orange); color: white; border-color: var(--orange); }

    /* Data Table */
    .data-table-wrap {
      border-radius: var(--radius-sm);
      border: 1px solid var(--grey-border); overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    table thead { background: var(--navy); }
    table th {
      padding: 13px 18px; text-align: left;
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.08em;
    }
    table td {
      padding: 14px 18px; border-bottom: 1px solid var(--grey-border);
      font-size: 13px; color: var(--navy);
    }
    table tbody tr { cursor: pointer; transition: var(--trans); }
    table tbody tr:hover td { background: var(--peach); }
    table tr:last-child td { border-bottom: none; }

    .time-pill {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 700; color: var(--orange);
      background: var(--orange-light); border: 1px solid var(--orange-border);
      padding: 3px 8px; border-radius: 20px;
    }

    /* Error Text */
    #error-box { margin-top: 10px; color: var(--danger); font-size: 14px; font-weight: 500; display:none; }

    /* Segmented Control */
    .segmented-control {
      display: flex; gap: 4px; background: var(--grey-bg);
      padding: 4px; border-radius: var(--radius-sm);
      border: 1px solid var(--grey-border);
      width: fit-content;
    }
    .segment-btn {
      padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
      color: var(--grey); background: transparent; border: none; cursor: pointer;
      transition: var(--trans);
    }
    .segment-btn:hover { color: var(--navy); }
    .segment-btn.active { background: var(--white); color: var(--navy); box-shadow: var(--shadow-sm); }

    /* Dynamic Form Rows */
    .dynamic-row {
      display: flex; gap: 12px; align-items: flex-start;
      background: var(--grey-bg); padding: 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--grey-border); margin-bottom: 12px;
      transition: var(--trans);
    }
    .dynamic-row:hover { border-color: var(--orange-border); }
    .dynamic-row .inputs { flex: 1; display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
    .dynamic-row input { margin-bottom: 0; }
    .dynamic-row .input-col { display: flex; flex-direction: column; gap: 4px;}
    .dynamic-row label.mini { font-size: 11px; color: var(--grey); font-weight: 600; margin:0;}
    
    .btn-remove-row {
      background: transparent; color: var(--grey-light); border: none; font-size: 18px;
      cursor: pointer; padding: 4px; transition: var(--trans);
      flex-shrink: 0; align-self: center; display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
    }
    .btn-remove-row:hover { color: var(--danger); background: var(--danger-bg); }
    .add-row-btn {
      width: 100%; border: 1.5px dashed var(--grey-border); background: transparent;
      color: var(--navy); font-size: 13px; font-weight: 600; padding: 12px;
      border-radius: var(--radius-sm); cursor: pointer; transition: var(--trans);
    }
    .add-row-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
    
    /* Scrollable modal content area */
    .modal-scroll-area { max-height: 50vh; overflow-y: auto; padding-right: 8px; margin-bottom: 20px;}
    .modal-scroll-area::-webkit-scrollbar { width: 6px; }
    .modal-scroll-area::-webkit-scrollbar-thumb { background: var(--grey-border); border-radius: 4px; }

    /* Checkbox & Batch */
    .row-checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: var(--orange); }
    #batchDeleteBtn { display: none; background: var(--danger-bg); color: var(--danger); box-shadow: none; }
    #batchDeleteBtn:hover { background: var(--danger); color: white; }

    /* Modal Overskirt */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,26,48,0.55); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 500;
    }
    .modal-overlay.active { display: flex; }

    .modal-card {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 36px 40px; width: 100%; max-width: 600px; max-height: 90vh;
      box-shadow: var(--shadow-lg); border: 1px solid var(--grey-border);
      overflow-y: auto;
    }
    .modal-title { font-size: 20px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; margin-top: 0; margin-bottom: 24px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px; }

    /* Tools Hub Admin View */
    .tools-section { display: none; }
    .tools-section.active { display: block; }
    .db-section { display: none; }
    .db-section.active { display: block; }

    .admin-tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .admin-tool-card {
      background: var(--white);
      border: 1.5px solid var(--grey-border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      transition: var(--trans);
      cursor: pointer;
    }
    .admin-tool-card:hover { border-color: var(--orange-border); box-shadow: var(--shadow); transform: translateY(-2px); }
    .admin-tool-card .card-edit-overlay {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 6px;
    }
    .admin-tool-card .card-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .admin-tool-card .tool-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .admin-tool-card .tool-name { font-size: 14px; font-weight: 700; color: var(--navy); }
    .admin-tool-card .tool-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .admin-tool-card .badge-v { font-size: 10px; font-weight: 700; color: var(--orange); background: var(--orange-light); border: 1px solid var(--orange-border); padding: 2px 6px; border-radius: 20px; }
    .admin-tool-card .badge-cat { font-size: 10px; font-weight: 600; color: var(--grey); background: var(--grey-bg); border: 1px solid var(--grey-border); padding: 2px 6px; border-radius: 20px; }
    .admin-tool-card .badge-new { font-size: 10px; font-weight: 700; color: #059669; background: #ecfdf5; border: 1px solid #6ee7b7; padding: 2px 6px; border-radius: 20px; }
    .admin-tool-card .tool-desc { font-size: 12px; color: var(--grey); line-height: 1.5; margin: 0; }
    .admin-tool-card .tag { font-size: 10px; font-weight: 600; color: var(--navy); background: var(--grey-bg); border: 1px solid var(--grey-border); padding: 2px 7px; border-radius: 20px; }
    .admin-tool-card .tool-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
    .drag-handle { cursor: grab; font-size: 16px; color: var(--grey-light); }

    /* Color Picker Row */
    .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 8px; }
    .color-swatch {
      width: 100%; padding-top: 100%; border-radius: var(--radius-sm);
      cursor: pointer; border: 2px solid transparent; transition: var(--trans);
      position: relative;
    }
    .color-swatch:hover, .color-swatch.selected { border-color: var(--navy); transform: scale(1.05); }
    .icon-preview {
      display: flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 14px; font-size: 28px;
      margin: 10px 0; border: 2px dashed var(--grey-border);
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <div class="nav-top">
        <a href="/" class="back-link">&larr; Back to ToolBox</a>
      </div>
      <h1>Database <span>Admin</span></h1>
    </div>
  </section>

  <div class="container">
    <div class="main-card">
      
      <div class="toolbar">
        <div class="form-group">
          <div class="segmented-control" id="dbSegmented">
            <button class="segment-btn active" data-section="tools-hub" onclick="switchSection('tools-hub')">🧰 Tools Hub</button>
            <button class="segment-btn" data-section="led" onclick="switchSection('led')">LED Boards Database</button>
            <button class="segment-btn" data-section="tutorials" onclick="switchSection('tutorials')">Tutorials Database</button>
          </div>
          <input type="hidden" id="dbSelect" value="led">
        </div>
        <div style="display:flex; gap: 12px; align-items: center;" id="dbToolbar">
          <button class="btn" id="batchDeleteBtn" onclick="batchDelete()">🗑️ Delete Selected</button>
          <button class="btn btn-ghost" onclick="openChangelogModal()">📜 View Changelog</button>
          <button class="btn" id="addRowBtn" onclick="openCreateModal()">+ Add New Row</button>
        </div>
        <div style="display:flex; gap: 12px; align-items: center;" id="toolsHubToolbar">
          <button class="btn" onclick="openToolModal()">+ Add New Tool</button>
        </div>
      </div>

      <div id="error-box"></div>

      <!-- Tools Hub Section -->
      <div class="tools-section" id="sectionToolsHub">
        <p style="font-size:13px; color:var(--grey); margin:0 0 16px;">Click any card to edit it. Add new tools using the button above.</p>
        <div class="admin-tools-grid" id="adminToolsGrid"></div>
      </div>

      <!-- DB Table Section -->
      <div class="db-section active" id="sectionDb">
      <div class="data-table-wrap">
        <table id="dataTable">
          <thead>
            <tr>
              <th style="width: 40px; text-align: center;"><input type="checkbox" id="selectAllCheckbox" class="row-checkbox" onchange="toggleSelectAll(this)"></th>
              <th style="width:60px">ID</th>
              <th>SKU</th>
              <th style="width: 150px">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Rows -->
          </tbody>
        </table>
      </div>
      </div>

    </div>
  </div>

  <!-- LED Modal -->
  <div class="modal-overlay" id="modalLed">
    <div class="modal-card">
      <h2 class="modal-title" id="modalLedTitle">Edit LED Board</h2>
      <input type="hidden" id="ledId">
      <div class="form-group" style="margin-bottom: 20px;">
        <label>Configuration SKU</label>
        <input type="text" id="ledSku">
      </div>
      <div class="form-group" style="margin-top: 24px;">
        <label>Available Sizes</label>
        <div class="modal-scroll-area">
          <div id="ledDynamicContainer"></div>
          <button class="add-row-btn" onclick="addLedRow()">+ Add Size Entry</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
        <button class="btn" onclick="saveLed()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Tutorial Modal -->
  <div class="modal-overlay" id="modalTutorial">
    <div class="modal-card">
      <h2 class="modal-title" id="modalTutorialTitle">Edit Tutorial</h2>
      <input type="hidden" id="tutId">
      <div class="form-group" style="margin-bottom: 16px;">
        <label>Playlist / Tool SKU</label>
        <input type="text" id="tutSku">
      </div>
      <div class="form-group" style="margin-bottom: 16px;">
        <label>Playlist Title</label>
        <input type="text" id="tutPlaylistName" placeholder="Optional">
      </div>
      <div class="form-group" style="margin-bottom: 16px;">
        <label>Playlist URL</label>
        <input type="text" id="tutPlaylistLink" placeholder="Optional">
      </div>
      <div class="form-group" style="margin-bottom: 24px;">
        <label>Video Links</label>
        <div class="modal-scroll-area">
          <div id="tutVideoContainer"></div>
          <button class="add-row-btn" onclick="addVideoRow()">+ Add Video Link</button>
        </div>
      </div>
      <div class="form-group">
        <label>File Downloads / Drivers</label>
        <div class="modal-scroll-area" style="max-height: 25vh">
          <div id="tutFileContainer"></div>
          <button class="add-row-btn" onclick="addFileRow()">+ Add File Link</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
        <button class="btn" onclick="saveTutorial()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Tool Hub Modal -->
  <div class="modal-overlay" id="modalTool">
    <div class="modal-card" style="max-width: 680px;">
      <h2 class="modal-title" id="modalToolTitle">Add New Tool</h2>
      <input type="hidden" id="toolId">
      <div class="modal-scroll-area" style="max-height: 65vh;">

        <!-- Icon & Preview -->
        <div style="display:flex; align-items:center; gap: 20px; margin-bottom: 20px;">
          <div class="icon-preview" id="toolIconPreview" style="background: linear-gradient(135deg,#1B2A4A,#2a3f6e);">🔧</div>
          <div style="flex:1">
            <label>Tool Emoji Icon</label>
            <input type="text" id="toolIconEmoji" maxlength="4" placeholder="e.g. 🖨️" oninput="updateToolPreview()">
          </div>
        </div>

        <!-- Icon Background -->
        <div class="form-group" style="margin-bottom: 16px;">
          <label>Icon Background Color</label>
          <div class="color-grid" id="iconBgGrid">
            <div class="color-swatch selected" style="background:linear-gradient(135deg,#1B2A4A,#2a3f6e);" data-bg="linear-gradient(135deg,#1B2A4A,#2a3f6e)" onclick="selectBg(this)"></div>
            <div class="color-swatch" style="background:linear-gradient(135deg,#FF6A00,#EE0979);" data-bg="linear-gradient(135deg,#FF6A00,#EE0979)" onclick="selectBg(this)"></div>
            <div class="color-swatch" style="background:linear-gradient(135deg,#43C6AC,#191654);" data-bg="linear-gradient(135deg,#43C6AC,#191654)" onclick="selectBg(this)"></div>
            <div class="color-swatch" style="background:linear-gradient(135deg,#f093fb,#f5576c);" data-bg="linear-gradient(135deg,#f093fb,#f5576c)" onclick="selectBg(this)"></div>
            <div class="color-swatch" style="background:linear-gradient(135deg,#4facfe,#00f2fe);" data-bg="linear-gradient(135deg,#4facfe,#00f2fe)" onclick="selectBg(this)"></div>
            <div class="color-swatch" style="background:linear-gradient(135deg,#43e97b,#38f9d7);" data-bg="linear-gradient(135deg,#43e97b,#38f9d7)" onclick="selectBg(this)"></div>
            <div class="color-swatch" style="background:linear-gradient(135deg,#fa709a,#fee140);" data-bg="linear-gradient(135deg,#fa709a,#fee140)" onclick="selectBg(this)"></div>
            <div class="color-swatch" style="background:linear-gradient(135deg,#a18cd1,#fbc2eb);" data-bg="linear-gradient(135deg,#a18cd1,#fbc2eb)" onclick="selectBg(this)"></div>
            <div class="color-swatch" style="background:linear-gradient(135deg,#30cfd0,#330867);" data-bg="linear-gradient(135deg,#30cfd0,#330867)" onclick="selectBg(this)"></div>
            <div class="color-swatch" style="background:linear-gradient(135deg,#ff9a9e,#fad0c4);" data-bg="linear-gradient(135deg,#ff9a9e,#fad0c4)" onclick="selectBg(this)"></div>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
          <label>Tool Name</label>
          <input type="text" id="toolName" placeholder="e.g. Printer IP Config" oninput="updateToolPreview()">
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap: 12px; margin-bottom: 16px;">
          <div class="form-group">
            <label>Version</label>
            <input type="text" id="toolVersion" placeholder="e.g. v1.0" oninput="updateToolPreview()">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="toolCategory" onchange="updateToolPreview()">
              <option value="android">Android</option>
              <option value="utilities" selected>Utilities</option>
              <option value="network">Network</option>
              <option value="web">Web</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
          <label>Category Label (shown as badge)</label>
          <input type="text" id="toolCategoryLabel" placeholder="e.g. Android · Network">
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
          <label>Description</label>
          <textarea id="toolDescription" style="min-height:80px; font-family: var(--font); font-size:14px;" placeholder="Short description of what this tool does..."></textarea>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
          <label>Feature Tags <span style="font-weight:400; color:var(--grey);">(comma-separated)</span></label>
          <input type="text" id="toolFeatures" placeholder="e.g. USB OTG, Offline, Multi-Brand">
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap: 12px; margin-bottom: 16px;">
          <div class="form-group">
            <label>Download Button Label</label>
            <input type="text" id="toolDownloadLabel" placeholder="e.g. ⬇ Download APK">
          </div>
          <div class="form-group">
            <label>Download URL / Link</label>
            <input type="text" id="toolDownloadUrl" placeholder="e.g. /downloads/app.apk or https://...">
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
          <label>Version History <span style="font-weight:400; color:var(--grey);">(optional — add multiple download versions)</span></label>
          <div id="toolVersionContainer"></div>
          <button class="add-row-btn" style="margin-top:8px;" onclick="addToolVersionRow()">+ Add Version Entry</button>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap: 12px; margin-bottom: 16px;">
          <div class="form-group">
            <label>Docs URL</label>
            <input type="text" id="toolDocsUrl" placeholder="https://... or #">
          </div>
          <div class="form-group">
            <label>Docs Label</label>
            <input type="text" id="toolDocsLabel" placeholder="e.g. Docs">
          </div>
        </div>

        <div class="form-group">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox" id="toolIsNew" checked style="width:auto; accent-color:var(--orange);"> Show "New" Badge
          </label>
        </div>

      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
        <button class="btn" onclick="saveTool()">Save Tool</button>
      </div>
    </div>
  </div>

  <!-- Changelog Modal -->
  <div class="modal-overlay" id="modalChangelog">
    <div class="modal-card" style="max-width: 800px;">
      <h2 class="modal-title">Database Audit Changelog</h2>
      <p style="font-size: 13px; color: var(--grey); margin-top: -16px; margin-bottom: 20px;">Displaying the most recent 5 records only.</p>
      <div class="data-table-wrap">
        <table id="changelogTable">
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>Action</th>
              <th>Table</th>
              <th>ID</th>
              <th>Operation</th>
            </tr>
          </thead>
          <tbody id="changelogBody">
          </tbody>
        </table>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModals()">Close</button>
      </div>
    </div>
  </div>

  <!-- Generic Confirm Modal -->
  <div class="modal-overlay" id="modalConfirm" style="z-index: 600;">
    <div class="modal-card" style="max-width: 400px; text-align: center; padding: 32px;">
      <h2 class="modal-title" id="confirmTitle" style="margin-bottom: 12px; color: var(--danger)">Confirm</h2>
      <p id="confirmMessage" style="font-size: 14px; color: var(--grey); margin-bottom: 24px; line-height: 1.5;"></p>
      <div style="display: flex; gap: 12px; justify-content: center;">
        <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
        <button class="btn" onclick="executeConfirm()" style="background:var(--danger); box-shadow: 0 4px 16px rgba(220,38,38,0.2); color:white; border:none;">Yes, I'm Sure</button>
      </div>
    </div>
  </div>

  <script>
    let currentData = [];
    let currentTools = [];
    let selectedIconBg = 'linear-gradient(135deg,#1B2A4A,#2a3f6e)';

    // ── Section Switcher ──────────────────────────────────
    function switchSection(section) {
      document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.segment-btn[data-section="${section}"]`).classList.add('active');

      const isToolsHub = section === 'tools-hub';
      document.getElementById('toolsHubToolbar').style.display = isToolsHub ? 'flex' : 'none';
      document.getElementById('dbToolbar').style.display       = isToolsHub ? 'none'  : 'flex';
      document.getElementById('sectionToolsHub').classList.toggle('active', isToolsHub);
      document.getElementById('sectionDb').classList.toggle('active', !isToolsHub);

      if (isToolsHub) {
        loadAdminTools();
      } else {
        document.getElementById('dbSelect').value = section;
        loadData();
      }
    }

    // Keep old switchDb for compat (not called from UI anymore)
    function switchDb(type) { switchSection(type); }

    // Dynamic Row Helpers
    function addLedRow(data = {Size:'', DisplaySize:'', PosterSize:''}) {
      const row = document.createElement('div');
      row.className = 'dynamic-row led-row';
      row.innerHTML = `
        <div class="inputs">
          <div class="input-col"><label class="mini">Board Size</label><input type="text" class="l-size" value="${data.Size||''}" placeholder="e.g. 50x50cm"></div>
          <div class="input-col"><label class="mini">Display Size</label><input type="text" class="l-dsize" value="${data.DisplaySize||''}" placeholder="Optional"></div>
          <div class="input-col"><label class="mini">Poster Size</label><input type="text" class="l-psize" value="${data.PosterSize||''}" placeholder="Optional"></div>
        </div>
        <button class="btn-remove-row" title="Remove row" onclick="this.parentElement.remove()">🗑️</button>
      `;
      document.getElementById('ledDynamicContainer').appendChild(row);
    }

    function addVideoRow(data = {title:'', link:''}) {
      const row = document.createElement('div');
      row.className = 'dynamic-row tut-video-row';
      row.innerHTML = `
        <div class="inputs">
          <div class="input-col"><label class="mini">Video Title</label><input type="text" class="v-title" value="${data.title||''}" placeholder="e.g. How to install"></div>
          <div class="input-col"><label class="mini">YouTube Link</label><input type="text" class="v-link" value="${data.link||''}" placeholder="https://youtube.com/..."></div>
        </div>
        <button class="btn-remove-row" title="Remove video" onclick="this.parentElement.remove()">🗑️</button>
      `;
      document.getElementById('tutVideoContainer').appendChild(row);
    }

    function addFileRow(data = {name:'', url:''}) {
      const row = document.createElement('div');
      row.className = 'dynamic-row tut-file-row';
      row.innerHTML = `
        <div class="inputs">
          <div class="input-col"><label class="mini">File Name</label><input type="text" class="f-name" value="${data.name||''}" placeholder="e.g. Driver v1.0"></div>
          <div class="input-col"><label class="mini">Download Link</label><input type="text" class="f-url" value="${data.url||''}" placeholder="https://drive.google.com/..."></div>
        </div>
        <button class="btn-remove-row" title="Remove file" onclick="this.parentElement.remove()">🗑️</button>
      `;
      document.getElementById('tutFileContainer').appendChild(row);
    }
    
    // Fetch Data
    async function loadData() {
      const type = document.getElementById('dbSelect').value;
      const url = type === 'led' ? '/api/led-data.json' : '/api/tutorial-data.json';
      
      const tbody = document.getElementById('tableBody');
      const errBox = document.getElementById('error-box');
      errBox.style.display = 'none';
      if (document.getElementById('selectAllCheckbox')) document.getElementById('selectAllCheckbox').checked = false;
      if (document.getElementById('batchDeleteBtn')) document.getElementById('batchDeleteBtn').style.display = 'none';
      
      if (currentData.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px;">Loading database cluster...</td></tr>';
      }
      
      try {
        const res = await fetch(url);
        if(!res.ok) throw new Error(`HTTP ${res.status}: API Endpoint not found or failed.`);
        currentData = await res.json();
        renderTable();
      } catch (e) {
        tbody.innerHTML = '';
        errBox.innerText = `API Error: ${e.message}\n(This usually means the backend is currently deploying. Wait 60 seconds and refresh.)`;
        errBox.style.display = 'block';
      }
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      if(currentData.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px; color: var(--grey)">No records found.</td></tr>';
          return;
      }
      currentData.forEach(item => {
        const tr = document.createElement('tr');
        tr.onclick = (e) => {
          if (e.target.closest('.item-checkbox') || e.target.closest('.btn-danger')) return;
          openEditModal(item.id);
        };
        tr.innerHTML = `
          <td style="text-align: center;"><input type="checkbox" class="row-checkbox item-checkbox" value="${item.id}" onchange="updateBatchSelect()"></td>
          <td style="font-weight: 600; color: var(--grey)">#${item.id}</td>
          <td style="font-weight: 500">${item.SKU}</td>
          <td>
            <button class="table-btn btn-danger" onclick="deleteItem(${item.id})">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Modal Logic
    let confirmCallback = null;
    function openConfirm(title, message, callback) {
      document.getElementById('confirmTitle').innerText = title;
      document.getElementById('confirmMessage').innerText = message;
      confirmCallback = callback;
      document.getElementById('modalConfirm').classList.add('active');
    }
    
    function executeConfirm() {
      if(confirmCallback) confirmCallback();
    }

    function closeModals() {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
    }

    function openCreateModal() {
      const type = document.getElementById('dbSelect').value;
      if (type === 'led') {
        document.getElementById('modalLedTitle').innerText = 'Add New LED Board';
        document.getElementById('ledId').value = '';
        document.getElementById('ledSku').value = '';
        document.getElementById('ledDynamicContainer').innerHTML = '';
        addLedRow();
        document.getElementById('modalLed').classList.add('active');
      } else {
        document.getElementById('modalTutorialTitle').innerText = 'Add New Tutorial';
        document.getElementById('tutId').value = '';
        document.getElementById('tutSku').value = '';
        document.getElementById('tutPlaylistName').value = '';
        document.getElementById('tutPlaylistLink').value = '';
        document.getElementById('tutVideoContainer').innerHTML = '';
        document.getElementById('tutFileContainer').innerHTML = '';
        addVideoRow();
        document.getElementById('modalTutorial').classList.add('active');
      }
    }

    function openEditModal(id) {
      const item = currentData.find(d => d.id === id);
      const type = document.getElementById('dbSelect').value;
      
      if (type === 'led') {
        document.getElementById('modalLedTitle').innerText = 'Edit LED Board';
        document.getElementById('ledId').value = item.id;
        document.getElementById('ledSku').value = item.SKU || '';
        document.getElementById('ledDynamicContainer').innerHTML = '';
        const details = item.Details || [];
        if (details.length === 0) addLedRow();
        else details.forEach(d => addLedRow(d));
        document.getElementById('modalLed').classList.add('active');
      } else {
        document.getElementById('modalTutorialTitle').innerText = 'Edit Tutorial';
        document.getElementById('tutId').value = item.id;
        document.getElementById('tutSku').value = item.SKU || '';
        document.getElementById('tutPlaylistName').value = item.PlaylistName || '';
        document.getElementById('tutPlaylistLink').value = item.PlaylistLink || '';
        document.getElementById('tutVideoContainer').innerHTML = '';
        const videos = item.VideoLinks || [];
        if (videos.length === 0) addVideoRow();
        else videos.forEach(v => addVideoRow(v));
        document.getElementById('tutFileContainer').innerHTML = '';
        const files = item.FileLinks || [];
        files.forEach(f => addFileRow(f));
        document.getElementById('modalTutorial').classList.add('active');
      }
    }

    // Save Handlers
    async function saveLed() {
      const id = document.getElementById('ledId').value;
      
      const rows = document.querySelectorAll('.led-row');
      const detailsArr = [];
      rows.forEach(r => {
          const s = r.querySelector('.l-size').value.trim();
          const ds = r.querySelector('.l-dsize').value.trim();
          const ps = r.querySelector('.l-psize').value.trim();
          if(s || ds || ps) detailsArr.push({ Size: s, DisplaySize: ds, PosterSize: ps });
      });

      const payload = {
        sku: document.getElementById('ledSku').value,
        details_json: JSON.stringify(detailsArr)
      };

      if (id) payload.id = parseInt(id);

      await sendRequest('/api/led-data.json', id ? 'PUT' : 'POST', payload);
    }

    async function saveTutorial() {
      const id = document.getElementById('tutId').value;
      
      const vRows = document.querySelectorAll('.tut-video-row');
      const vArr = [];
      vRows.forEach(r => {
          const title = r.querySelector('.v-title').value.trim();
          const link = r.querySelector('.v-link').value.trim();
          if(title || link) vArr.push({ title, link });
      });

      const fRows = document.querySelectorAll('.tut-file-row');
      const fArr = [];
      fRows.forEach(r => {
          const name = r.querySelector('.f-name').value.trim();
          const url = r.querySelector('.f-url').value.trim();
          if(name || url) fArr.push({ name, url });
      });

      const payload = {
        sku: document.getElementById('tutSku').value,
        playlist_name: document.getElementById('tutPlaylistName').value,
        playlist_link: document.getElementById('tutPlaylistLink').value,
        video_links_json: JSON.stringify(vArr),
        file_links_json: JSON.stringify(fArr)
      };

      if (id) payload.id = parseInt(id);

      await sendRequest('/api/tutorial-data.json', id ? 'PUT' : 'POST', payload);
    }

    // Delete Handler
    function deleteItem(id) {
      openConfirm("Delete Row?", "Are you sure you want to permanently delete this row? This cannot be easily undone.", async () => {
          const type = document.getElementById('dbSelect').value;
          const url = type === 'led' ? '/api/led-data.json' : '/api/tutorial-data.json';
          await sendRequest(url, 'DELETE', { id });
          closeModals();
      });
    }

    // Batch Select Handlers
    function toggleSelectAll(masterCb) {
      document.querySelectorAll('.item-checkbox').forEach(cb => cb.checked = masterCb.checked);
      updateBatchSelect();
    }
    
    function updateBatchSelect() {
      const checkedBoxes = document.querySelectorAll('.item-checkbox:checked');
      const btn = document.getElementById('batchDeleteBtn');
      if (checkedBoxes.length > 0) {
        btn.style.display = 'inline-flex';
        btn.innerText = `🗑️ Delete Selected (${checkedBoxes.length})`;
      } else {
        btn.style.display = 'none';
        document.getElementById('selectAllCheckbox').checked = false;
      }
    }
    
    function batchDelete() {
      const checkedBoxes = document.querySelectorAll('.item-checkbox:checked');
      const ids = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
      if (!ids.length) return;
      openConfirm("Delete Multiple Rows?", `Are you sure you want to permanently delete ${ids.length} rows? This cannot be easily undone.`, async () => {
          const type = document.getElementById('dbSelect').value;
          const url = type === 'led' ? '/api/led-data.json' : '/api/tutorial-data.json';
          await sendRequest(url, 'DELETE', { ids });
          closeModals();
      });
    }

    // Changelog Handlers
    async function openChangelogModal() {
        document.getElementById('modalChangelog').classList.add('active');
        const tbody = document.getElementById('changelogBody');
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">Fetching logs...</td></tr>';
        
        try {
            const res = await fetch('/api/changelog.json');
            if(!res.ok) throw new Error("Changelog DB unavailable.");
            const logs = await res.json();
            
            tbody.innerHTML = '';
            logs.forEach(log => {
                const tr = document.createElement('tr');
                const revertBtn = (log.action === 'CREATE' || log.action === 'UPDATE' || log.action === 'DELETE') 
                    ? `<button class="table-btn revert-btn" onclick="revertLog(${log.id})">⏪ Revert</button>` 
                    : '';
                
                tr.innerHTML = `
                    <td><span class="time-pill">${log.timestamp}</span></td>
                    <td style="font-weight: 700; color: var(--navy)">${log.action}</td>
                    <td>${log.target_table}</td>
                    <td style="color: var(--grey); font-weight:600">#${log.target_id}</td>
                    <td>${revertBtn}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="5" style="color:var(--danger)">Error: ${e.message}</td></tr>`;
        }
    }

    function revertLog(logId) {
        openConfirm("Revert Action?", "Are you sure you want to instantly revert the database to undo this specific action?", async () => {
            try {
                const res = await fetch('/api/changelog-revert.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ logId })
                });
                if (res.ok) {
                    closeModals();
                    loadData();
                } else alert('Revert Error: ' + await res.text());
            } catch (e) {
                alert('Revert Network Error: ' + e.message);
            }
        });
    }

    // API Comms
    async function sendRequest(url, method, payload) {
      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          closeModals();
          loadData();
        } else {
          alert('Error: ' + await res.text());
        }
      } catch (e) {
        alert('Network Error: ' + e.message);
      }
    }

    // ── Tools Hub ─────────────────────────────────────────
    async function loadAdminTools() {
      const grid = document.getElementById('adminToolsGrid');
      grid.innerHTML = '<p style="color:var(--grey); font-size:13px;">Loading tools...</p>';
      try {
        const res = await fetch('/api/tools.json');
        currentTools = await res.json();
        renderAdminTools();
      } catch(e) {
        grid.innerHTML = `<p style="color:var(--danger)">Error: ${e.message}</p>`;
      }
    }

    function renderAdminTools() {
      const grid = document.getElementById('adminToolsGrid');
      if (!currentTools.length) {
        grid.innerHTML = '<p style="color:var(--grey);font-size:13px;">No tools yet. Click "+ Add New Tool" to create one.</p>';
        return;
      }
      grid.innerHTML = currentTools.map(tool => `
        <div class="admin-tool-card" onclick="openToolModal(${tool.id})">
          <div class="card-edit-overlay">
            <button class="table-btn btn-danger" onclick="event.stopPropagation(); deleteTool(${tool.id})">Delete</button>
          </div>
          <div class="card-top">
            <div class="tool-icon" style="background:${tool.icon_bg};">${tool.icon_emoji}</div>
            <div>
              <div class="tool-name">${tool.name}</div>
              <div class="tool-badges">
                <span class="badge-v">${tool.version || ''}</span>
                <span class="badge-cat">${tool.category_label || ''}</span>
                ${tool.is_new ? '<span class="badge-new">New</span>' : ''}
              </div>
            </div>
          </div>
          <p class="tool-desc">${tool.description || ''}</p>
          <div class="tool-tags">${(tool.features || []).map(f => `<span class="tag">${f}</span>`).join('')}</div>
        </div>
      `).join('');
    }

    function openToolModal(id) {
      document.getElementById('toolVersionContainer').innerHTML = '';
      // Reset color swatches
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      document.querySelector('.color-swatch').classList.add('selected');
      selectedIconBg = 'linear-gradient(135deg,#1B2A4A,#2a3f6e)';

      if (id) {
        const tool = currentTools.find(t => t.id === id);
        if (!tool) return;
        document.getElementById('modalToolTitle').innerText = 'Edit Tool';
        document.getElementById('toolId').value = tool.id;
        document.getElementById('toolIconEmoji').value = tool.icon_emoji || '';
        document.getElementById('toolIconPreview').innerText = tool.icon_emoji || '🔧';
        document.getElementById('toolIconPreview').style.background = tool.icon_bg;
        document.getElementById('toolName').value = tool.name || '';
        document.getElementById('toolVersion').value = tool.version || '';
        document.getElementById('toolCategory').value = tool.category || 'utilities';
        document.getElementById('toolCategoryLabel').value = tool.category_label || '';
        document.getElementById('toolDescription').value = tool.description || '';
        document.getElementById('toolFeatures').value = (tool.features || []).join(', ');
        document.getElementById('toolDownloadLabel').value = tool.download_label || '';
        document.getElementById('toolDownloadUrl').value = tool.download_url || '';
        document.getElementById('toolDocsUrl').value = tool.docs_url || '';
        document.getElementById('toolDocsLabel').value = tool.docs_label || 'Docs';
        document.getElementById('toolIsNew').checked = tool.is_new;
        selectedIconBg = tool.icon_bg;

        // Select matching swatch
        document.querySelectorAll('.color-swatch').forEach(s => {
          if (s.dataset.bg === tool.icon_bg) { s.classList.add('selected'); }
        });

        // Populate version rows
        (tool.versions || []).forEach(v => addToolVersionRow(v));
      } else {
        document.getElementById('modalToolTitle').innerText = 'Add New Tool';
        document.getElementById('toolId').value = '';
        document.getElementById('toolIconEmoji').value = '';
        document.getElementById('toolIconPreview').innerText = '🔧';
        document.getElementById('toolIconPreview').style.background = selectedIconBg;
        document.getElementById('toolName').value = '';
        document.getElementById('toolVersion').value = '';
        document.getElementById('toolCategory').value = 'utilities';
        document.getElementById('toolCategoryLabel').value = '';
        document.getElementById('toolDescription').value = '';
        document.getElementById('toolFeatures').value = '';
        document.getElementById('toolDownloadLabel').value = '⬇ Download';
        document.getElementById('toolDownloadUrl').value = '';
        document.getElementById('toolDocsUrl').value = '#';
        document.getElementById('toolDocsLabel').value = 'Docs';
        document.getElementById('toolIsNew').checked = true;
      }
      document.getElementById('modalTool').classList.add('active');
    }

    function selectBg(el) {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      selectedIconBg = el.dataset.bg;
      document.getElementById('toolIconPreview').style.background = selectedIconBg;
    }

    function updateToolPreview() {
      const emoji = document.getElementById('toolIconEmoji').value.trim();
      document.getElementById('toolIconPreview').innerText = emoji || '🔧';
    }

    function addToolVersionRow(data = {version:'', label:'', downloadUrl:''}) {
      const row = document.createElement('div');
      row.className = 'dynamic-row tool-ver-row';
      row.innerHTML = `
        <div class="inputs" style="grid-template-columns:1fr 1fr 2fr;">
          <div class="input-col"><label class="mini">Version</label><input type="text" class="tv-ver" value="${data.version||''}" placeholder="v1.0"></div>
          <div class="input-col"><label class="mini">Label</label><input type="text" class="tv-label" value="${data.label||''}" placeholder="Latest"></div>
          <div class="input-col"><label class="mini">Download URL</label><input type="text" class="tv-url" value="${data.downloadUrl||''}" placeholder="https://... or /downloads/..."></div>
        </div>
        <button class="btn-remove-row" onclick="this.parentElement.remove()">🗑️</button>
      `;
      document.getElementById('toolVersionContainer').appendChild(row);
    }

    async function saveTool() {
      const id = document.getElementById('toolId').value;
      const featuresRaw = document.getElementById('toolFeatures').value;
      const features = featuresRaw.split(',').map(f => f.trim()).filter(Boolean);

      const vRows = document.querySelectorAll('.tool-ver-row');
      const versions = [];
      vRows.forEach(r => {
        const v = r.querySelector('.tv-ver').value.trim();
        const l = r.querySelector('.tv-label').value.trim();
        const u = r.querySelector('.tv-url').value.trim();
        if (v) versions.push({ version: v, label: l, downloadUrl: u });
      });

      const payload = {
        name:           document.getElementById('toolName').value.trim(),
        version:        document.getElementById('toolVersion').value.trim(),
        icon_emoji:     document.getElementById('toolIconEmoji').value.trim() || '🔧',
        icon_bg:        selectedIconBg,
        category:       document.getElementById('toolCategory').value,
        category_label: document.getElementById('toolCategoryLabel').value.trim(),
        is_new:         document.getElementById('toolIsNew').checked,
        description:    document.getElementById('toolDescription').value.trim(),
        features_json:  JSON.stringify(features),
        download_label: document.getElementById('toolDownloadLabel').value.trim(),
        download_url:   document.getElementById('toolDownloadUrl').value.trim(),
        versions_json:  JSON.stringify(versions),
        docs_url:       document.getElementById('toolDocsUrl').value.trim() || '#',
        docs_label:     document.getElementById('toolDocsLabel').value.trim() || 'Docs',
        sort_order:     0,
      };

      if (!payload.name) { alert('Tool Name is required.'); return; }
      if (id) payload.id = parseInt(id);

      try {
        const res = await fetch('/api/tools.json', {
          method: id ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) { closeModals(); loadAdminTools(); }
        else alert('Error: ' + await res.text());
      } catch(e) { alert('Network Error: ' + e.message); }
    }

    function deleteTool(id) {
      openConfirm('Delete Tool?', 'This will permanently remove this tool from the public ToolBox. Are you sure?', async () => {
        const res = await fetch('/api/tools.json', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        if (res.ok) { closeModals(); loadAdminTools(); }
        else alert('Error: ' + await res.text());
      });
    }

    // Changelog Handlers
    async function openChangelogModal() {
        document.getElementById('modalChangelog').classList.add('active');
        const tbody = document.getElementById('changelogBody');
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">Fetching logs...</td></tr>';
        
        try {
            const res = await fetch('/api/changelog.json');
            if(!res.ok) throw new Error("Changelog DB unavailable.");
            const logs = await res.json();
            
            tbody.innerHTML = '';
            logs.forEach(log => {
                const tr = document.createElement('tr');
                const revertBtn = (log.action === 'CREATE' || log.action === 'UPDATE' || log.action === 'DELETE') 
                    ? `<button class="table-btn revert-btn" onclick="revertLog(${log.id})">⏪ Revert</button>` 
                    : '';
                tr.innerHTML = `
                    <td><span class="time-pill">${log.timestamp}</span></td>
                    <td style="font-weight: 700; color: var(--navy)">${log.action}</td>
                    <td>${log.target_table}</td>
                    <td style="color: var(--grey); font-weight:600">#${log.target_id}</td>
                    <td>${revertBtn}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="5" style="color:var(--danger)">Error: ${e.message}</td></tr>`;
        }
    }

    function revertLog(logId) {
        openConfirm("Revert Action?", "Are you sure you want to instantly revert the database to undo this specific action?", async () => {
            try {
                const res = await fetch('/api/changelog-revert.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ logId })
                });
                if (res.ok) { closeModals(); loadData(); }
                else alert('Revert Error: ' + await res.text());
            } catch (e) {
                alert('Revert Network Error: ' + e.message);
            }
        });
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.modal-overlay').forEach(modal => {
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModals(); });
      });
      // Start on Tools Hub tab
      document.getElementById('toolsHubToolbar').style.display = 'flex';
      document.getElementById('dbToolbar').style.display = 'none';
      loadAdminTools();
    });
  </script>
</body>
</html>
